service: boombayan-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    USERS_TABLE: ${self:service}-${sls:stage}-users
    CONFIG_TABLE: ${self:service}-${sls:stage}-config
    MEMBERS_TABLE: ${self:service}-${sls:stage}-members
    LOANS_TABLE: ${self:service}-${sls:stage}-loans
    TRANSACTIONS_TABLE: ${self:service}-${sls:stage}-transactions
    CYCLES_TABLE: ${self:service}-${sls:stage}-cycles
    DIVIDENDS_TABLE: ${self:service}-${sls:stage}-dividends
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,https://d1iwtuq558xock.cloudfront.net
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt UsersTable.Arn
            - !GetAtt ConfigTable.Arn
            - !GetAtt MembersTable.Arn
            - !GetAtt LoansTable.Arn
            - !GetAtt TransactionsTable.Arn
            - !GetAtt CyclesTable.Arn
            - !GetAtt DividendsTable.Arn

# Patterns preserve the `backend/` prefix in the zip (Serverless's `../` traversal
# doesn't rebase paths), so the handler below is backend.app.handler.handler, not
# app.handler.handler. Any new file added under backend/app/ is auto-included by
# the second pattern; anything added under backend/ but outside backend/app/ that
# needs to ship in the Lambda package needs its own explicit pattern entry here.
package:
  patterns:
    - '!**'
    - '../backend/app/**'
    - '../backend/__init__.py'

custom:
  pythonRequirements:
    fileName: ../backend/requirements.txt
    # true: pydantic-core (and other native deps) must be built as Linux wheels
    # via Docker — building on macOS produces darwin .so files Lambda can't load.
    dockerizePip: true

plugins:
  - serverless-python-requirements

functions:
  api:
    handler: backend.app.handler.handler
    events:
      - httpApi: '*'
  penaltyCheck:
    handler: backend.app.penalty_handler.handler
    events:
      - schedule: rate(6 hours)

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: UserId
            AttributeType: S
        KeySchema:
          - AttributeName: UserId
            KeyType: HASH
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    ConfigTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONFIG_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: ConfigKey
            AttributeType: S
        KeySchema:
          - AttributeName: ConfigKey
            KeyType: HASH
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    MembersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MEMBERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: MemberId
            AttributeType: S
        KeySchema:
          - AttributeName: MemberId
            KeyType: HASH
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    LoansTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.LOANS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: LoanId
            AttributeType: S
        KeySchema:
          - AttributeName: LoanId
            KeyType: HASH
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    TransactionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TRANSACTIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: LoanId
            AttributeType: S
          - AttributeName: Timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: LoanId
            KeyType: HASH
          - AttributeName: Timestamp
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    CyclesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CYCLES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: CycleId
            AttributeType: S
        KeySchema:
          - AttributeName: CycleId
            KeyType: HASH
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    DividendsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DIVIDENDS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: CycleId
            AttributeType: S
          - AttributeName: MemberId
            AttributeType: S
        KeySchema:
          - AttributeName: CycleId
            KeyType: HASH
          - AttributeName: MemberId
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${sls:stage}-users
        # Prevents accidental `serverless remove`/stack rollback from wiping
        # the only store of board members' login credentials.
        DeletionProtection: ACTIVE
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 10
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${sls:stage}-web
        UserPoolId: !Ref CognitoUserPool
        # ALLOW_USER_SRP_AUTH, not ALLOW_USER_PASSWORD_AUTH: the frontend's
        # amazon-cognito-identity-js CognitoUser.authenticateUser() always
        # performs SRP internally (it has no plain-password mode) - found
        # during Task 18's real login test, which failed with
        # InvalidParameterException: "USER_SRP_AUTH is not enabled for the
        # client" until this was corrected. SRP is also strictly more
        # secure (password never transmitted), so this isn't a downgrade.
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        GenerateSecret: false

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
