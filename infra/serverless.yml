service: boombayan-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}

# Patterns preserve the `backend/` prefix in the zip (Serverless's `../` traversal
# doesn't rebase paths), so the handler below is backend.app.handler.handler, not
# app.handler.handler. Any new file added under backend/app/ is auto-included by
# the second pattern; anything added under backend/ but outside backend/app/ that
# needs to ship in the Lambda package needs its own explicit pattern entry here.
package:
  patterns:
    - '!**'
    - '../backend/app/**'
    - '../backend/__init__.py'

custom:
  pythonRequirements:
    fileName: ../backend/requirements.txt
    # true: pydantic-core (and other native deps) must be built as Linux wheels
    # via Docker — building on macOS produces darwin .so files Lambda can't load.
    dockerizePip: true

plugins:
  - serverless-python-requirements

functions:
  api:
    handler: backend.app.handler.handler
    events:
      - httpApi: '*'
